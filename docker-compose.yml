version: '3.8'

services:
  # N8N - Workflow automation
  n8n:
    image: n8nio/n8n:latest
    container_name: koala-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_TUNNEL_URL=http://localhost:5678/
      - N8N_EDITOR_BASE_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - koala-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./koala-backend
      dockerfile: Dockerfile
    container_name: koala-backend
    ports:
      - "8000:8000"
    environment:
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/koala-questionnaire
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      - ./koala-backend:/app
    networks:
      - koala-network
    depends_on:
      n8n:
        condition: service_healthy
    restart: unless-stopped

volumes:
  n8n_data:

networks:
  koala-network:
    driver: bridge
